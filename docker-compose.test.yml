version: "3.9"

# Lightweight setup for CI — Testcontainers will handle DB/Redis
services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

networks:
  default:
    name: neng-nom-test-network
